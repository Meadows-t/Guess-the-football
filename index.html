<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a472a">
    <title>Guess the Football ⚽</title>
    style.css
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>⚽ Guess the Football</h1>
            <p class="subtitle">Find the hidden ball in 3 chances!</p>
        </header>

        <!-- Game Stats -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Score</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="chances">3</div>
                <div class="stat-label">Chances</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">Streak</div>
            </div>
        </div>

        <!-- Game Board -->
        <div class="game-board" id="gameBoard">
            <!-- Generated by JavaScript -->
        </div>

        <!-- Feedback Message -->
        <div class="feedback" id="feedback"></div>

        <!-- Reset Button -->
        <button class="btn-reset" id="resetBtn" style="display: none;">
            🔄 Play Again
        </button>

        <!-- Instructions -->
        <div class="instructions">
            <h3>How to Play</h3>
            <ul>
                <li>Tap a box to make your guess</li>
                <li>Green box = Found the ball! 🎉</li>
                <li>Red box = Wrong guess ❌</li>
                <li>You have 3 chances per round</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
