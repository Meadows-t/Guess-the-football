<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spot the Ball Quiz</title>
  <!-- Link to CSS -->
  style.css
</head>
<body>
  <h1>Spot the Ball Quiz</h1>
  <div id="scoreboard">
    Round <span id="round-num">1</span>/5 &ndash; Score: <span id="score-total">0</span>
  </div>
  <div id="image-container">
    <!-- Round image with id for scripting -->
    images/round1.jpg
  </div>
  <p id="instruction">Tap/click the image to place your guess, then press "Confirm Guess".</p>
  <button id="confirm-btn" style="display: none;" disabled>Confirm Guess</button>
  <button id="next-btn" style="display: none;">Next Round</button>
  <div id="result"></div>
  <!-- Load the script at end to ensure elements exist before script runs -->
  script.js</script>
</body>
</html>
